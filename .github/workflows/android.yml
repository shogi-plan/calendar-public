name: Build Android APK

on:
  push:
    branches:
      - main # masterブランチをお使いの場合は、ここを master に書き換えてください

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # package.jsonがある場所を探して移動し、インストールします
      - name: Install Dependencies
        run: |
          TARGET_DIR=$(find . -name "package.json" -not -path "*/node_modules/*" -exec dirname {} \; | head -n 1)
          cd $TARGET_DIR
          npm install

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # index.html を探し出し、正しい場所に「www」フォルダを強制作成します
      - name: Force Fix Web Assets Directory
        run: |
          TARGET_DIR=$(find . -name "package.json" -not -path "*/node_modules/*" -exec dirname {} \; | head -n 1)
          HTML_PATH=$(find . -name "index.html" -not -path "*/node_modules/*" | head -n 1)
          
          if [ -z "$HTML_PATH" ]; then
            echo "Error: index.html がリポジトリ内に見つかりません！"
            exit 1
          fi
          
          mkdir -p "$TARGET_DIR/www"
          cp "$HTML_PATH" "$TARGET_DIR/www/index.html"
          echo "Successfully created $TARGET_DIR/www/index.html"

      # 準備万端の状態で Capacitor を実行します
      - name: Initialize Capacitor Android
        run: |
          TARGET_DIR=$(find . -name "package.json" -not -path "*/node_modules/*" -exec dirname {} \; | head -n 1)
          cd $TARGET_DIR
          npx cap add android || true
          npx cap sync

      # 【今回修正】万が一複数のandroidプロジェクトが見つかっても、最初の1つ（head -n 1）だけに絞ってビルドします
      - name: Build APK
        run: |
          ANDROID_DIR=$(find . -name "build.gradle" -path "*/android/*" -exec dirname {} \; | head -n 1)
          echo "Targeting Android directory: $ANDROID_DIR"
          cd $ANDROID_DIR
          ./gradlew assembleDebug

      # 完成したAPKファイルを確実に保存します
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/app/build/outputs/apk/debug/app-debug.apk"
