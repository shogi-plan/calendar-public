<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>遠タメ将棋 Online</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <style>
    :root { 
      --board-color: #edc9af; 
      --primary-btn: #2196f3; 
      --danger-btn: #d32f2f; 
      --select-color: #ff9800;
      --call-btn: #4caf50;
    }
    body { 
      font-family: sans-serif; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      background: #eee; 
      margin: 0; 
      padding: 2px; 
      touch-action: manipulation; 
    }

    #game-main { 
      display: flex; 
      flex-direction: row; 
      justify-content: center;     /* 中央寄せ */
      align-items: flex-start; 
      width: 100%;
      max-width: 100vw;            /* 画面幅を絶対超えない */
      gap: 2px;                    /* 隙間を最小限に */
      margin: 0 auto;
      overflow: hidden;            /* スクロールを禁止 */
      padding: 5px 2px;
      box-sizing: border-box;
    }

    /* 将棋盤と持ち駒エリアを包むラッパー */
    #board-wrapper {
      position: relative;
      width: 80vw;
      max-width: 460px;
      flex-shrink: 1;
      transition: width 0.2s;
      display: flex;
      flex-direction: column;
      gap: 4px;
      box-sizing: border-box;
    }
    #board-wrapper.playing-size {
      width: 96vw;
      max-width: 550px;
    }

    #board-container { 
      position: relative; 
      width: 100%; 
      aspect-ratio: 878 / 960; 
      flex-shrink: 1; 
      box-sizing: border-box;
    }

    #board { 
      position: relative; 
      display: grid; 
      grid-template-columns: repeat(9, 1fr);
      grid-template-rows: repeat(9, 1fr);
      border: none; 
      width: 100%; 
      height: 100%; 
      background-image: url('assets/light_878x960.png');
      background-size: 100% 100%; 
      background-repeat: no-repeat;
      background-position: center;
      box-sizing: border-box; 
      background-color: var(--board-color);
      padding: 1.3% !important; 
      margin: 0 !important;
    }

    .cell {
      width: 100%;
      height: 100%;
      position: relative;
      cursor: pointer;
      border: none;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin: 0;
      padding: 0 !important; 
    }

    .piece { 
      width: 90%; 
      height: 90%;
      z-index: 10; 
      pointer-events: none; 
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s;
      position: relative;
      margin: auto;
    }

    .piece.opposite { 
      transform: rotate(180deg); 
    }

    .piece-img {
      width: 100%;
      height: 100%;
      background-image: url('assets/piece.png');
      background-size: 800% 400%; 
      background-repeat: no-repeat;
      display: block;
      pointer-events: none;
      position: absolute;
      top: 50%;
      left: 50%;
      image-rendering: -webkit-optimize-contrast;
      transform: translate(-50%, -50%);
      margin: 0;
      padding: 0;
    }

    .cell.selected {
      background-color: rgba(255, 152, 0, 0.5); 
    }

    .piece.opposite { transform: rotate(180deg); }
    .piece.promoted { color: var(--danger-btn); }
    .kifu-list { flex-grow: 1; overflow-y: scroll; background: #fafafa; font-size: 9px; padding: 0; margin: 0; }
    .kifu-item { padding: 5px 1px; cursor: pointer; border-bottom: 1px solid #eee; text-align: center; white-space: nowrap; }
    .kifu-item.active { background: var(--primary-btn); color: white; }
    .nav-controls { display: grid; grid-template-columns: 1fr 1fr; background: #ddd; gap: 1px; padding: 1px; }
    .nav-btn { font-size: 8px; padding: 6px 0; border: 1px solid #bbb; background: #fff; cursor: pointer; font-weight: bold; letter-spacing: -0.5px; }
    #nav-pos { grid-column: span 2; font-size: 9px; text-align: center; background: #eee; padding: 2px 0; border-bottom: solid 1px #ccc; }
    .controls { display: flex; gap: 2px; margin-bottom: 4px; flex-wrap: wrap; justify-content: center; background: #ddd; padding: 4px; border-radius: 4px; width: 98%; box-sizing: border-box; }
    button { cursor: pointer; border: none; border-radius: 3px; font-weight: bold; padding: 5px 6px; font-size: 11px; }
    button:disabled { background: #bbb !important; opacity: 0.6; cursor: not-allowed; }
    #btnReset { background: var(--danger-btn); color: white; }
    .status-area { display: flex; gap: 4px; margin-bottom: 4px; width: 100%; justify-content: center; }
    .timer { font-family: monospace; font-size: 14px; font-weight: bold; background: #fff; padding: 2px 4px; border: 1px solid #555; border-radius: 3px; min-width: 70px; text-align: center; }
    .your-turn { border-color: var(--danger-btn); background: #ffebee; }
    .timer-alert { color: var(--danger-btn) !important; }
    #promote-dialog { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; padding: 20px; border: 4px solid #5d4037; z-index: 2000; text-align: center; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); min-width: 160px; }
    .call-area { display: flex; flex-wrap: wrap; gap: 4px; margin: 4px 0; background: #fff; padding: 5px; border-radius: 5px; border: 1px solid #ccc; align-items: center; justify-content: center; width: 98%; box-sizing: border-box; }
    #btnCallStart { background: var(--call-btn); color: white; }
    #btnMute { background: #757575; color: white; }
    #btnCallEnd { background: var(--danger-btn); color: white; }
    #callStatusDisplay { font-size: 10px; color: #333; font-weight: bold; }
    .vol-ctrl { font-size: 10px; display: flex; align-items: center; gap: 2px; }
    .chat-message { margin-bottom: 4px; line-height: 1.4; border-bottom: 1px dotted #eee; padding-bottom: 2px; font-size: 12px;}
    .chat-msg-self { color: #0d47a1; background: #e3f2fd; border-radius: 3px; padding: 2px 4px; }
    .chat-msg-other { color: #1b5e20; background: #e8f5e9; border-radius: 3px; padding: 2px 4px; }
    .chat-name { font-weight: bold; margin-right: 5px; display: none; } 
    
    /* --- 持ち駒エリア（横長仕様に全面的に変更） --- */
    .hand {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      width: 100%;
      /* 添付画像の美しい本榧木目の色合い（気品ある黄金・コハク色）を繊細に再現 */
      background: linear-gradient(to bottom, #f2d194 0%, #ecd09e 15%, #e1be82 70%, #d8b273 100%);
      /* 将棋盤の極細の漆線を模した、漆黒に近い深みのある細い境界線 */
      border: 1px solid #4a3319;
      /* 面取りされた美しい木製駒台を模したシャープな角丸 */
      border-radius: 3px;
      padding: 0 1.3% !important; /* 上下パディングをゼロにして、左右は将棋盤のpaddingと一致させる */
      box-sizing: border-box;
      gap: 0;
      z-index: 5;
      /* 本榧の厚みと優美な質感（艶）を演出する内光と床へのソフトな陰影 */
      box-shadow: 
        inset 0 1px 1px rgba(255, 255, 255, 0.55),
        inset 0 -1.5px 2px rgba(80, 50, 20, 0.15),
        0 1.5px 4px rgba(0, 0, 0, 0.25);
    }

    /* 盤反転時の上側駒台の180度回転に適用するクラス */
    .hand.left-rotated {
      transform: rotate(180deg);
    }
    
    /* 持ち駒のスロットと個数表示 */
    .hand-slot {
      width: 100%;
      aspect-ratio: 878 / 960; /* 盤面のセル（.cell）と完全に一貫した比率にする */
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }

    /* 持ち駒スロット内の駒サイズ：盤面（.piece）と完全に一致させる */
    .hand-slot .piece {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 90%; /* 盤上の piece の width: 90% と完全に揃える */
      height: 90%; /* 盤上の piece の height: 90% と完全に揃える */
      aspect-ratio: 878 / 960; /* 歪みを防ぐためにオリジナルの比率を維持 */
    }

    .hand-count {
      position: absolute;
      bottom: 2px;
      right: 2px;
      background: rgba(0,0,0,0.7);
      color: white;
      font-size: 10px; /* 駒が大きくなったので、文字も読みやすく少し大きく */
      padding: 1px 3px;
      border-radius: 3px;
      z-index: 15;
      pointer-events: none;
      font-weight: bold;
    }
    .selected-piece {
      background-color: rgba(255, 152, 0, 0.5);
      border-radius: 2px;
    }

    /* --- 感想戦パネルのレイアウト補正 --- */
    #review-panel {
      display: none;
      flex-direction: column;
      width: 22vw;
      min-width: 85px;
      max-width: 100px;
      background: #ccc;
      border: 1px solid #999;
      box-sizing: border-box;
      flex-shrink: 0;
      align-self: stretch; 
      height: auto;
      margin-left: auto; /* ギリギリまで右端へ移動させる */
    }
    .kifu-list { 
      flex: 1 1 0; 
      overflow-y: auto; 
      background: #fafafa; 
      font-size: 9px; 
      padding: 0; 
      margin: 0;
      min-height: 0; 
    }

    :root { --setting-btn: #ff5722; }
    #btnSetting { background: var(--setting-btn); color: white; font-weight: bold; box-shadow: 0 0 8px rgba(255, 87, 34, 0.5); }
    #setting-dialog { 
      display: none; 
      position: fixed; 
      top: 50%; 
      left: 50%; 
      transform: translate(-50%, -50%); 
      background: white; 
      padding: 20px; 
      border-radius: 8px; 
      box-shadow: 0 0 20px rgba(0,0,0,0.5); 
      z-index: 3000; 
      width: 280px; 
    }
    #import-dialog {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 20px;
      border-radius: 8px;
      border: 3px solid #4caf50;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      z-index: 3000;
      width: 280px;
      text-align: center;
    }
    .setting-row { margin-bottom: 15px; }
    .setting-row label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; }
    .setting-row select { width: 100%; padding: 5px; border: 1px solid #ccc; border-radius: 3px; }
    
    /* カウントダウンモーダル */
    #countdown-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      color: white;
      font-weight: bold;
      pointer-events: none;
    }
    #countdown-text {
      font-size: 15vw; 
      white-space: nowrap; 
      text-shadow: 0 0 20px rgba(255,255,255,0.5);
      transition: all 0.2s;
      text-align: center;
      width: 100%;
    }
    /* 準備完了ランプ */
    .ready-area { display: flex; gap: 8px; align-items: center; justify-content: center; margin: 4px 0; }
    .ready-lamp { width: 12px; height: 12px; border-radius: 50%; background: #ccc; border: 1px solid #999; }
    .ready-lamp.on { background: #4caf50; box-shadow: 0 0 8px #4caf50; border-color: #fff; }
  </style>
</head>
<body>
<div id="countdown-overlay"><div id="countdown-text">5</div></div>
<h1>遠タメ将棋 Online</h1>

<div class="controls">
  <div style="font-size:10px; margin-bottom:2px; width:100%; text-align:center;">
    <button id="btnSetting">対局準備</button>
    <button id="btnFlip">反転</button>
    <button id="btnImportKif" style="background:#4caf50; color:white;">棋譜検討</button>
    <button id="btnResign">投了</button>
  </div>

  <div id="import-dialog">
    <h3 style="margin-top:0; border-bottom:1px solid #eee; padding-bottom:10px; font-size:14px; color:#333;">棋譜検討（データ取り込み）</h3>
    <p style="font-size:11px; color:#666; margin-bottom:15px; text-align:left; line-height:1.4;">
      他のアプリで対局したKIF形式の棋譜データを取り込み、感想戦を開始します。
    </p>
    <div style="display: flex; flex-direction: column; gap: 10px;">
      <button id="btnImportClipboard" style="background: #2196f3; color: white; padding: 8px 12px; font-size: 11px;">クリップボードから取り込み</button>
      <button id="btnImportFile" style="background: #ff9800; color: white; padding: 8px 12px; font-size: 11px;">KIFファイルの取り込み</button>
      <button id="btnImportCancel" style="background: #ccc; color: #333; padding: 8px 12px; font-size: 11px; font-weight: normal;">閉じる</button>
    </div>
    <input type="file" id="kifFileInput" accept=".kif,.txt" style="display: none;">
  </div>

  <div id="setting-dialog">
    <h3 style="margin-top:0; border-bottom:1px solid #eee; padding-bottom:10px;">対局設定</h3>
    
    <div class="setting-row">
      <label>持ち時間</label>
      <select id="cfgMain">
        <option value="0">0分（即秒読み）</option>
        <option value="10" selected>10分</option>
        <option value="15">15分</option>
        <option value="30">30分</option>
        <option value="999999">無制限</option>
      </select>
    </div>

    <div class="setting-row">
      <label>秒読み</label>
      <select id="cfgByo">
        <option value="30" selected>30秒</option>
        <option value="60">60秒</option>
        <option value="999999">無制限</option>
      </select>
    </div>

    <div class="setting-row">
      <label>手合割（駒落ち）</label>
      <select id="cfgHandicap">
        <option value="平手">平手</option>
        <option value="香落ち">香落ち (上手：左香)</option>
        <option value="角落ち">角落ち</option>
        <option value="飛車落ち">飛車落ち</option>
        <option value="飛香落ち">飛香落ち</option>
        <option value="二枚落ち">二枚落ち (飛角)</option>
        <option value="四枚落ち">四枚落ち (飛角香香)</option>
        <option value="六枚落ち">六枚落ち (＋桂桂)</option>
        <option value="八枚落ち">八枚落ち (＋銀銀)</option>
      </select>
    </div>
    <div class="setting-row">
      <label>上手（駒を落とす側）</label>
      <select id="cfgUwateSide">
        <option value="G">後手△が上手</option>
        <option value="S">先手▲が上手</option>
      </select>
    </div>
    <div style="display:flex; gap:10px;">
      <button id="btnSettingSave" style="flex:1; background:var(--call-btn); color:white; padding:10px;">適用して初期化</button>
      <button id="btnSettingCancel" style="flex:1; background:#ccc; padding:10px;">閉じる</button>
    </div>
  </div>
</div>

<div class="ready-area">
  <select id="mySideSelect" style="font-size:10px;">
    <option value="" selected>未選択</option>
    <option value="S">先手▲</option>
    <option value="G">後手△</option>
  </select>
  <button id="btnReady" style="background: #ff9800; color: white; padding: 4px 8px;">対局準備完了</button>
  <div style="display: flex; gap: 4px; font-size: 10px; align-items: center; margin-left:5px;">
    ▲<div id="lamp-S" class="ready-lamp"></div>
    △<div id="lamp-G" class="ready-lamp"></div>
  </div>
</div>
<div id="status-txt" style="font-size:11px; font-weight:bold; margin-left:10px; text-align:center;">接続待ち...</div>
<div id="prep-guide-txt" style="font-size: 11px; color: #555; margin: 6px auto; text-align: center; max-width: 95%; background: #fffde7; border: 1px solid #fff59d; padding: 6px; border-radius: 4px; line-height: 1.4; display: none; box-sizing: border-box;"></div>

<div class="call-area">
  <button id="btnCallStart">通話開始</button>
  <button id="btnMute" disabled>ミュート</button>
  <button id="btnCallEnd" disabled>通話終了</button>
  <div class="vol-ctrl">
    音量:<input type="range" id="volume-control" min="0" max="1" step="0.1" value="1" style="width:50px;">
  </div>
  <span id="callStatusDisplay">オフライン</span>
</div>

<div class="status-area">
  <div id="timer-S" class="timer">▲ --:--</div>
  <div id="timer-G" class="timer">△ --:--</div>
</div>

<div id="game-main">
  <div id="game-main-inner" style="display: flex; flex-direction: row; align-items: flex-start; gap: 4px;">
    <!-- 将棋盤と上下に配置された持ち駒エリアを包むコンテナ -->
    <div id="board-wrapper">
      <div class="hand" id="handG"></div>
      <div id="board-container">
        <div id="board"></div>
        <div id="promote-dialog">
          <div style="margin-bottom:15px; font-weight:bold; font-size:16px;">成りますか？</div>
          <div style="display: flex; gap: 15px; justify-content: center;">
            <button id="btn-prom-yes" style="background:var(--danger-btn); color:white; padding: 12px 20px; font-size: 16px;">成る</button>
            <button id="btn-prom-no" style="background:#757575; color:white; padding: 12px 20px; font-size: 16px;">不成</button>
          </div>
        </div>
      </div>
      <div class="hand" id="handS"></div>
    </div>
  </div>

  <div id="review-panel">
    <div id="nav-pos">0/0</div>
    <div id="kifu-container" class="kifu-list"></div>
    <div class="nav-controls">
      <button id="nav-prev" class="nav-btn">＜前</button>
      <button id="nav-next" class="nav-btn">次＞</button>
      <button id="nav-first" class="nav-btn">最初</button>
      <button id="nav-last" class="nav-btn">最後</button>
      <button id="btnResetBranches" class="nav-btn" style="background: #2196f3; color: white;">本線に戻る</button>
      <button id="btnKif" class="nav-btn" style="background: #4caf50; color: white;">KIFコピー</button>
    </div>
  </div>
</div>

<!-- AI局面解析パネル（検討・感想戦モード時のみ表示） -->
<div id="ai-analysis-panel" style="display: none; width: 95%; max-width: 500px; margin: 10px auto; background: #fff; border: 1px solid #ff9800; border-radius: 5px; box-sizing: border-box; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
  <div style="background: #fff3e0; padding: 8px 12px; border-bottom: 1px solid #ffe0b2; display: flex; justify-content: space-between; align-items: center;">
    <span style="font-weight: bold; color: #e65100; font-size: 13px; display: flex; align-items: center; gap: 4px;">
      🤖 将棋AI局面解析
    </span>
    <span id="ai-status-label" style="font-size: 11px; color: #e65100; font-weight: bold;">解析準備完了</span>
  </div>
  
  <div style="padding: 12px; display: flex; flex-direction: column; gap: 10px;">
    <!-- 形勢評価エリア（波線グラフ） -->
    <div id="ai-evaluation-area" style="display: none; background: #fafafa; border: 1px solid #eee; border-radius: 4px; padding: 8px;">
      <div style="display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; margin-bottom: 6px;">
        <span style="color: #2196f3;">▲ 先手</span>
        <span id="ai-eval-score" style="color: #333; font-family: monospace;">未解析</span>
        <span style="color: #4caf50;">後手 △</span>
      </div>
      <div id="ai-chart-canvas-container" style="position: relative; width: 100%; height: 120px; background: #fff; border: 1px solid #ddd; border-radius: 4px; overflow: hidden; box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);">
        <div style="text-align: center; color: #aaa; font-size: 11px; padding-top: 50px;">任意の局面をタップするか、下のボタンで解析を開始してください</div>
      </div>
    </div>

    <!-- 推奨手表示 -->
    <div id="ai-recommended-area" style="display: none; background: #f1f8e9; border: 1px solid #d0e7b5; border-radius: 4px; padding: 8px;">
      <div style="font-size: 11px; font-weight: bold; color: #33691e; margin-bottom: 4px;">💡 AI推奨の指し手候補:</div>
      <div id="ai-recommended-list" style="font-size: 12px; color: #1b5e20; font-family: sans-serif; display: flex; flex-direction: column; gap: 2px;"></div>
    </div>

    <!-- AI解説表示 -->
    <div id="ai-explanation-box" style="font-size: 12px; line-height: 1.6; color: #333; max-height: 180px; overflow-y: auto; background: #fafafa; padding: 10px; border: 1px solid #eee; border-radius: 4px; white-space: pre-wrap; font-family: sans-serif;">現在の局面について、AIが形勢判断、推奨手、今後の指し針などを詳細に分析・解説します。</div>
    
    <!-- 全解析実行ボタン -->
    <div style="display: flex; gap: 8px; width: 100%;">
      <button id="btnAiAnalyzeAll" style="flex: 1; background: #ff9800; color: white; padding: 10px; font-size: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: background 0.2s;">
        棋譜の全指し手をAI解析する
      </button>
      <button id="btnAiCancelAll" style="flex: 1; background: #f44336; color: white; padding: 10px; font-size: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: background 0.2s; display: none;">
        全解析を中断する
      </button>
    </div>
  </div>
</div>

<div id="chat-container" style="width: 95%; max-width: 500px; margin: 10px auto; background: #fff; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box;">
  <div id="chatLog" style="height: 120px; overflow-y: auto; padding: 5px; background: #fafafa;"></div>
  <div style="display: flex; padding: 5px; gap: 5px;">
    <input type="text" id="chatInput" placeholder="メッセージを入力..." style="flex: 1; padding: 5px;">
    <button id="btnSend" style="background: var(--primary-btn); color: white;">送信</button>

  </div>
</div>

<audio id="remote-audio" autoplay></audio>
<audio id="localAudio" autoplay muted style="display:none;"></audio>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
  import { getDatabase, ref, set, onValue, push, remove, update, get, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

  // --- 環境変数またはダミーフォールバックからFirebaseConfigを設定し、参照エラーを完璧に回避する ---
  const firebaseConfig = {
    apiKey: "AIzaSyCx5anv3WWOQyke9kqhhZ9Zx-RjynLuxzE",
    authDomain: "calendar-chousei.firebaseapp.com",
    databaseURL: "https://calendar-chousei-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "calendar-chousei",
    storageBucket: "calendar-chousei.firebasestorage.app",
    messagingSenderId: "368704703397",
    appId: "1:368704703397:web:86ae24d920aaf7c5a0f64c"
  };
  
  // --- Firebase 初期化 ---
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // --- 追加：サーバー時刻との時差を補正する ---
  let serverOffset = 0;
  const offsetRef = ref(db, ".info/serverTimeOffset");
  onValue(offsetRef, (snap) => {
    serverOffset = snap.val() || 0;
  });

  /** 端末の時計をサーバー基準に補正した現在時刻(ms)を返す **/
  function getServerNow() {
    return Date.now() + serverOffset;
  }
  
  // --- ルーム管理：ファイル名から部屋名を取得 ---
  const params = new URLSearchParams(window.location.search);
  const fileName = window.location.pathname.split("/").pop().split(".")[0];
  let roomName = params.get('room') || fileName || "default_room";

  // --- 各データへの参照定義 ---
  const gameRef = ref(db, `${roomName}/shogiData`);
  const reviewRef = ref(db, `${roomName}/reviewData`);
  const callStatusRef = ref(db, `${roomName}/callStatus`);
  const signalingRef = ref(db, `${roomName}/signaling`);
  const readyRef = ref(db, `${roomName}/readyStatus`); 
  const configLockRef = ref(db, `${roomName}/configLock`); 

  let isCountingDown = false; 

  const SYMBOLS = {FU:'歩',KY:'香',KE:'桂',GI:'銀',KI:'金',KA:'角',HI:'飛',OU:'玉',TO:'と',NY:'杏',NK:'圭',NG:'全',UM:'馬',RY:'龍'};

  // 駒音の定義
  const pieceSound = new Audio("assets/komaoto.mp3");
  function playPieceSound() {
    pieceSound.currentTime = 0;
    pieceSound.play().catch(e => console.warn("音源の再生に失敗しました:", e));
  }

  const PROMOTE_MAP = {FU:'TO',KY:'NY',KE:'NK',GI:'NG',KA:'UM',HI:'RY'};
  const UNPROMOTE_MAP = {TO:'FU',NY:'KY',NK:'KE',NG:'GI',UM:'KA',RY:'HI'};
  const KANJI_NUM = ["","一","二","三","四","五","六","七","八","九"];
  const ZEN_NUM = ["","１","２","３","４","５","６","７","８","９"];

  let state = { board: "[]", handS: [], handG: [], turn: 'S', timers: {S: 600, G: 600}, config: {main: 600, byo: 30}, lastTick: 0, history: [], winner: null, winReason: "" };
  let sel = null, selH = null, possibleMoves = [], pendingProm = null;
  let isReviewMode = sessionStorage.getItem(`isReview_${roomName}`) === "true";
  let viewIdx = -1, rvState = null;
  let selectedBranches = {};
  let currentReadyData = { S: false, G: false };

  function buildActiveLine() {
    const line = [];
    if (!state.history || state.history.length === 0) return line;

    function traverse(moveList) {
      for (let i = 0; i < moveList.length; i++) {
        const move = moveList[i];
        if (!move.id) {
          move.id = i === 0 ? "start" : "mid_" + i + "_" + Math.floor(Math.random() * 1000000);
        }
        line.push(move);
        const bIdx = selectedBranches[move.id];
        if (typeof bIdx === 'number' && move.branches && move.branches[bIdx]) {
          traverse(move.branches[bIdx]);
          break; 
        }
      }
    }

    traverse(state.history);
    return line;
  }

  function findMoveNodeById(moveList, targetId) {
    for (let i = 0; i < moveList.length; i++) {
      const move = moveList[i];
      if (move.id === targetId) return move;
      if (move.branches) {
        for (let b = 0; b < move.branches.length; b++) {
          const res = findMoveNodeById(move.branches[b], targetId);
          if (res) return res;
        }
      }
    }
    return null;
  }

  function findMoveArrayContainingId(moveList, targetId) {
    for (let i = 0; i < moveList.length; i++) {
      if (moveList[i].id === targetId) return moveList;
      if (moveList[i].branches) {
        for (let b = 0; b < moveList[i].branches.length; b++) {
          const res = findMoveArrayContainingId(moveList[i].branches[b], targetId);
          if (res) return res;
        }
      }
    }
    return null;
  }

  function addReviewMove(moveData, newBoard, newHandS, newHandG) {
    const currentLine = buildActiveLine();
    if (viewIdx < 0 || viewIdx >= currentLine.length) viewIdx = currentLine.length - 1;
    const parentMove = currentLine[viewIdx]; 

    const newMove = {
      ...moveData,
      id: "move_" + Date.now() + "_" + Math.floor(Math.random() * 1000),
      board: JSON.stringify(newBoard),
      handS: [...(newHandS || [])],
      handG: [...(newHandG || [])]
    };

    if (viewIdx === currentLine.length - 1) {
      if (parentMove.id === "start") {
        state.history.push(newMove);
      } else {
        const parentArray = findMoveArrayContainingId(state.history, parentMove.id);
        if (parentArray) {
          parentArray.push(newMove);
        } else {
          state.history.push(newMove);
        }
      }
    } else {
      const parentNode = findMoveNodeById(state.history, parentMove.id);
      if (parentNode) {
        if (!parentNode.branches) parentNode.branches = [];

        let existingIdx = -1;
        for (let i = 0; i < parentNode.branches.length; i++) {
          const branchFirstMove = parentNode.branches[i][0];
          if (branchFirstMove && 
              branchFirstMove.toX === moveData.toX && 
              branchFirstMove.toY === moveData.toY && 
              branchFirstMove.fromX === moveData.fromX && 
              branchFirstMove.fromY === moveData.fromY && 
              branchFirstMove.type === moveData.type && 
              branchFirstMove.isDrop === moveData.isDrop) {
            existingIdx = i;
            break;
          }
        }

        if (existingIdx !== -1) {
          selectedBranches[parentMove.id] = existingIdx;
        } else {
          parentNode.branches.push([newMove]);
          selectedBranches[parentMove.id] = parentNode.branches.length - 1;
        }
      }
    }

    set(ref(db, `${roomName}/shogiData/history`), state.history);

    viewIdx++; 
    rvState = {
      board: newBoard,
      handS: [...(newHandS || [])],
      handG: [...(newHandG || [])],
      turn: (moveData.side === 'S' ? 'G' : 'S')
    };
    pushReviewUpdate();
    render();
    updateKifuList();
  }
  const boardEl = document.getElementById('board'); 

  let mySide = sessionStorage.getItem(`mySide_${roomName}`) || '';
  const mySideSelect = document.getElementById('mySideSelect');
  mySideSelect.value = mySide;

  // --- 盤面と駒台の配置をまるごと入れ替える関数 ---
  function updateDisplayRotation(isFlipped) {
    const container = document.getElementById('game-main-inner');
    const board = document.getElementById('board');
    const boardWrapper = document.getElementById('board-wrapper');
    const boardContainer = document.getElementById('board-container');
    const handS = document.getElementById('handS');
    const handG = document.getElementById('handG');
    const reviewPanel = document.getElementById('review-panel');

    // モードに応じてクラスを付け替え
    if (!isReviewMode) {
      boardWrapper.classList.add('playing-size');
      boardWrapper.style.width = "";       // インラインスタイルを完全にクリア
      boardWrapper.style.maxWidth = "";    // インラインスタイルを完全にクリア
      container.style.width = "";          // クリア
      container.style.flexGrow = "";       // クリア
      container.style.maxWidth = "";       // クリア
      reviewPanel.style.display = 'none';  // 對局中は隠す
      container.style.alignItems = 'flex-start';
    } else {
      boardWrapper.classList.remove('playing-size');
      reviewPanel.style.display = 'flex';  // 感想戦は表示
      
      // 感想戦用の幅（余白を無くして限界まで大きく表示）
      container.style.flexGrow = "1";
      container.style.maxWidth = "550px"; /* 対局中と同じサイズに制限 */
      container.style.alignItems = 'stretch';
      
      boardWrapper.style.width = "100%";
      boardWrapper.style.maxWidth = "550px";
    }

    // いったん上下の回転クラスをリセット
    handS.classList.remove('left-rotated');
    handG.classList.remove('left-rotated');

    if (isFlipped) {
      // 後手視点：上側に先手駒、下側に後手駒
      boardWrapper.insertBefore(handS, boardContainer); 
      boardWrapper.appendChild(handG);
      
      board.style.transformOrigin = "center center";
      board.style.transform = 'rotate(180deg)';
      
      // 上側の先手駒台（相手の駒）を180度回転
      handS.classList.add('left-rotated');
    } else {
      // 先手視点：上側に後手駒、下側に先手駒
      boardWrapper.insertBefore(handG, boardContainer);
      boardWrapper.appendChild(handS);
      
      board.style.transformOrigin = "center center";
      board.style.transform = 'rotate(0deg)';
      
      // 上側の後手駒台（相手の駒）を180度回転
      handG.classList.add('left-rotated');
    }
  }

  // 初回表示の適用
  let currentFlip = (mySide === 'G');
  updateDisplayRotation(currentFlip);

  mySideSelect.onchange = (e) => { 
    mySide = e.target.value; 
    if (mySide) {
      sessionStorage.setItem(`mySide_${roomName}`, mySide);
    } else {
      sessionStorage.removeItem(`mySide_${roomName}`);
    }
    currentFlip = (mySide === 'G');
    updateDisplayRotation(currentFlip);
    updateReadyButton();
    render(); 
  };

  // 反転ボタン
  document.getElementById('btnFlip').onclick = () => {
    currentFlip = !currentFlip;
    updateDisplayRotation(currentFlip);
  };

  // --- 通話維持用 ---
  let wakeLock = null;
  let silenceAudio = null;
  let audioCtx = null;
  let keepAliveInterval = null; 
  const silenceData = "data:audio/wav;base64,UklGRigAAABXQVZFRm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==";

  async function startKeepAlive() {
    try {
      if ('wakeLock' in navigator) {
        try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e){}
      }
      
      if (!silenceAudio) { 
        silenceAudio = new Audio(silenceData); 
        silenceAudio.loop = true; 
        silenceAudio.volume = 0.01; 
      }
      await silenceAudio.play().catch(e => console.warn("Audio play failed", e));

      if (!audioCtx) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AudioContext();
        const buffer = audioCtx.createBuffer(1, 1, 22050);
        const source = audioCtx.createBufferSource();
        source.buffer = buffer;
        source.loop = true;
        source.connect(audioCtx.destination);
        source.start();
        audioCtx.onstatechange = () => {
          if (audioCtx.state === 'suspended' && localCallStartPressed) audioCtx.resume();
        };
      }
      if (audioCtx.state === 'suspended') await audioCtx.resume();

      if (!keepAliveInterval) {
        keepAliveInterval = setInterval(async () => {
          if (localCallStartPressed && mySide) {
            const updateObj = {};
            updateObj[`lastActive/${mySide}`] = serverTimestamp();
            await update(callStatusRef, updateObj);
          }
        }, 30000); 
      }

    } catch (err) { console.warn("Keep-alive Error:", err); }
  }

  function stopKeepAlive() {
    if (wakeLock) { try { wakeLock.release(); } catch(e){} wakeLock = null; }
    if (silenceAudio) { silenceAudio.pause(); }
    if (audioCtx) { try { audioCtx.close(); } catch(e){} audioCtx = null; }
    if (keepAliveInterval) {
      clearInterval(keepAliveInterval);
      keepAliveInterval = null;
    }
  }

  document.addEventListener('visibilitychange', async () => {
    if (document.visibilityState === 'visible' && localCallStartPressed) {
      if ('wakeLock' in navigator && !wakeLock) {
        try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e){}
      }
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      
      const snap = await get(callStatusRef);
      const data = snap.val();
      if (data && data.status === 'started' && mySide === 'S') {
        sendOffer();
      }
    }
  });

  // --- WebRTC ---
  let localStream = null, peerConnection = null, localCallStartPressed = false, isMuted = false;
  let isRemoteDescriptionSet = false;
  let pendingCandidates = [];
  let processedCandidates = new Set();
  const configuration = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
  const btnCallStart = document.getElementById('btnCallStart'), btnCallEnd = document.getElementById('btnCallEnd'), btnMute = document.getElementById('btnMute'), callStatusDisplay = document.getElementById('callStatusDisplay'), volumeControl = document.getElementById('volume-control');

  volumeControl.addEventListener('input', () => { const ra = document.getElementById('remote-audio'); if (ra) ra.volume = parseFloat(volumeControl.value); });
  btnMute.onclick = () => { if (!localStream) return; isMuted = !isMuted; localStream.getAudioTracks().forEach(t => t.enabled = !isMuted); btnMute.textContent = isMuted ? '解除' : 'ミュート'; btnMute.style.background = isMuted ? "var(--danger-btn)" : "#757575"; };

  async function startLocalStream() { 
    if (localStream) localStream.getTracks().forEach(t => t.stop()); 
    localStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }, video: false }); 
    return localStream; 
  }

  function createPeerConnection() {
    if (peerConnection && peerConnection.signalingState !== 'closed') return;
    peerConnection = new RTCPeerConnection(configuration);
    isRemoteDescriptionSet = false;
    pendingCandidates = [];
    processedCandidates.clear();
    
    peerConnection.oniceconnectionstatechange = () => {
      const state = peerConnection.iceConnectionState;
      if (state === "failed" || state === "disconnected") handleIceRestart();
    };

    peerConnection.ontrack = e => { const ra = document.getElementById('remote-audio'); if (ra) ra.srcObject = e.streams[0]; };
    if (localStream) localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
    peerConnection.onicecandidate = e => { 
      if (e.candidate && mySide) { 
        push(ref(db, `${roomName}/signaling/candidates/${mySide}`), { candidate: e.candidate.toJSON() }); 
      } 
    };
  }

  async function sendOffer() { 
    createPeerConnection(); 
    const offer = await peerConnection.createOffer(); 
    await peerConnection.setLocalDescription(offer); 
    await set(ref(db, `${roomName}/signaling/offer`), { sdp: offer.sdp, type: offer.type, from: mySide }); 
  }

  async function sendAnswer() { 
    const snap = await get(ref(db, `${roomName}/signaling/offer`)); 
    if (!snap.exists()) return; 
    const offer = snap.val(); 
    createPeerConnection(); 
    await peerConnection.setRemoteDescription(new RTCSessionDescription(offer)); 
    isRemoteDescriptionSet = true;
    while (pendingCandidates.length > 0) {
      const cand = pendingCandidates.shift();
      peerConnection.addIceCandidate(cand).catch(e => {});
    }
    const answer = await peerConnection.createAnswer(); 
    await peerConnection.setLocalDescription(answer); 
    await set(ref(db, `${roomName}/signaling/answer`), { sdp: answer.sdp, type: answer.type, from: mySide }); 
  }

  async function handleIceRestart() {
    if (!peerConnection || peerConnection.signalingState === 'closed') return;
    try {
      const offer = await peerConnection.createOffer({ iceRestart: true });
      await peerConnection.setLocalDescription(offer);
      await set(ref(db, `${roomName}/signaling/offer`), { sdp: offer.sdp, type: offer.type, from: mySide, isRestart: true });
    } catch (e) { console.error("Restart ICE failed:", e); }
  }

  btnCallStart.onclick = async () => { 
    if (!mySide) {
      alert("先手または後手を選択してから通話を開始してください。");
      return;
    }
    if (localCallStartPressed) return; 
    
    localCallStartPressed = true; 
    updateCallUI(); 

    try { 
      const updates = {};
      updates[`users/${mySide}`] = true;
      
      const currentSnap = await get(callStatusRef);
      const currentStatus = currentSnap.val();
      
      if (!currentStatus || !currentStatus.users || (!currentStatus.users.S && !currentStatus.users.G)) {
        await remove(signalingRef);
        updates['status'] = 'waiting';
      }
      
      await update(callStatusRef, updates);

      await startKeepAlive(); 
      await startLocalStream(); 
      
      createPeerConnection();
      
      const nextSnap = await get(callStatusRef);
      const nextData = nextSnap.val();
      const otherSide = (mySide === 'S' ? 'G' : 'S');
      const isOtherReady = !!(nextData && nextData.users && nextData.users[otherSide]);

      if (isOtherReady) {
        await update(callStatusRef, { status: 'started' });
        if (mySide === 'S') {
          setTimeout(() => {
            if (localCallStartPressed) sendOffer();
          }, 3000); 
        }
      }
    } catch (e) { 
      console.error("Call Start Error:", e);
      localCallStartPressed = false; 
      updateCallUI(); 
      stopKeepAlive(); 
      alert("マイクの使用が許可されていないか、エラーが発生しました。");
    } 
  };

  btnCallEnd.onclick = async () => { 
    if (!confirm("通話を終了しますか？")) return;
    sessionStorage.setItem(`isManualEnd_${roomName}`, 'true');

    await update(callStatusRef, { 
      status: 'ended', 
      users: null,
      lastActive: null 
    });

    await remove(signalingRef);
    handleCallEndInternal(); 
  };

  function handleCallEndInternal() { 
    localCallStartPressed = false; 
    isMuted = false;
    isRemoteDescriptionSet = false;
    pendingCandidates = [];
    processedCandidates.clear();
    stopKeepAlive(); 
    
    if (peerConnection) { 
      try { peerConnection.close(); } catch(e){}
      peerConnection = null; 
    } 
    if (localStream) { 
      localStream.getTracks().forEach(t => t.stop()); 
      localStream = null; 
    } 

    const ra = document.getElementById('remote-audio');
    if (ra) ra.srcObject = null;

    btnMute.textContent = 'ミュート';
    btnMute.style.background = "#757575";

    callStatusDisplay.textContent = "オフライン";
    updateCallUI(); 

    if (sessionStorage.getItem(`isManualEnd_${roomName}`) === 'true') {
      sessionStorage.removeItem(`isManualEnd_${roomName}`);
      window.location.reload(); 
    }
  }

  function updateCallUI() {
    btnCallStart.disabled = localCallStartPressed;
    btnCallEnd.disabled = !localCallStartPressed;
    btnMute.disabled = !localCallStartPressed;

    btnCallStart.style.opacity = localCallStartPressed ? "0.5" : "1";
    btnCallEnd.style.opacity = !localCallStartPressed ? "0.5" : "1";
    btnMute.style.opacity = !localCallStartPressed ? "0.5" : "1";
  }

  onValue(callStatusRef, async (snap) => { 
    const data = snap.val(); 
    if (!data) {
      if (localCallStartPressed) handleCallEndInternal();
      updateCallUI();
      return;
    }
    
    const iAmRegisteredOnFirebase = !!(data.users && mySide && data.users[mySide]);
    const otherSide = (mySide === 'S' ? 'G' : 'S');
    const isOtherRegistered = !!(data.users && data.users[otherSide]);

    if (localCallStartPressed && mySide === 'S' && isOtherRegistered && data.status === 'waiting') {
      await update(callStatusRef, { status: 'started' });
      setTimeout(() => {
        if (localCallStartPressed) sendOffer();
      }, 2000);
    }

    const shouldTerminate = localCallStartPressed && (
      data.status === 'ended' || 
      (data.status === 'started' && !isOtherRegistered) ||
      (data.status === 'waiting' && !iAmRegisteredOnFirebase && data.users)
    );

    if (shouldTerminate) {
      handleCallEndInternal();
      return;
    }
    
    if (!localCallStartPressed && iAmRegisteredOnFirebase && data.status !== 'ended') {
      const updates = {};
      updates[`users/${mySide}`] = null;
      if (!isOtherRegistered) {
        updates['status'] = 'offline';
      }
      update(callStatusRef, updates);
      return;
    }

    if (data.status === 'started' && isOtherRegistered && iAmRegisteredOnFirebase) {
      callStatusDisplay.textContent = "通話中"; 
    } else if (isOtherRegistered && !iAmRegisteredOnFirebase) {
      callStatusDisplay.textContent = "相手が通話を開始しました";
      btnCallStart.style.boxShadow = "0 0 10px #4caf50"; 
    } else if (iAmRegisteredOnFirebase && !isOtherRegistered) {
      callStatusDisplay.textContent = "相手の応答待ち...";
    } else {
      callStatusDisplay.textContent = "オフライン";
      btnCallStart.style.boxShadow = "none";
    }

    updateCallUI(); 
  });

  onValue(ref(db, `${roomName}/signaling/offer`), snap => { 
    const offer = snap.val(); 
    if (offer && mySide && offer.from !== mySide && localCallStartPressed) {
      sendAnswer(); 
    }
  });

  onValue(ref(db, `${roomName}/signaling/answer`), async snap => { 
    const answer = snap.val(); 
    if (answer && mySide && answer.from !== mySide && peerConnection) {
      await peerConnection.setRemoteDescription(new RTCSessionDescription(answer)); 
      isRemoteDescriptionSet = true;
      while (pendingCandidates.length > 0) {
        const cand = pendingCandidates.shift();
        peerConnection.addIceCandidate(cand).catch(e => {});
      }
    }
  });

  onValue(ref(db, `${roomName}/signaling/candidates/S`), snap => { 
    if (mySide === 'G' && peerConnection && snap.exists()) {
      Object.values(snap.val()).forEach(d => {
        if (!d.candidate || !d.candidate.candidate) return;
        const candStr = d.candidate.candidate;
        if (processedCandidates.has(candStr)) return;
        processedCandidates.add(candStr);
        try {
          const cand = new RTCIceCandidate(d.candidate);
          if (isRemoteDescriptionSet) {
            peerConnection.addIceCandidate(cand).catch(e => {});
          } else {
            pendingCandidates.push(cand);
          }
        } catch (err) { console.warn("Candidates/S constructor err:", err); }
      });
    }
  });

  onValue(ref(db, `${roomName}/signaling/candidates/G`), snap => { 
    if (mySide === 'S' && peerConnection && snap.exists()) {
      Object.values(snap.val()).forEach(d => {
        if (!d.candidate || !d.candidate.candidate) return;
        const candStr = d.candidate.candidate;
        if (processedCandidates.has(candStr)) return;
        processedCandidates.add(candStr);
        try {
          const cand = new RTCIceCandidate(d.candidate);
          if (isRemoteDescriptionSet) {
            peerConnection.addIceCandidate(cand).catch(e => {});
          } else {
            pendingCandidates.push(cand);
          }
        } catch (err) { console.warn("Candidates/G constructor err:", err); }
      });
    }
  });

  // --- Firebase 将棋データ監視 ---
  let lastInitAt = 0; 

  onValue(gameRef, (snap) => {
    const data = snap.val();
    if (!data) return;

    if (data.initAt) {
      if (lastInitAt !== 0 && data.initAt !== lastInitAt) {
        mySide = '';
        sessionStorage.removeItem(`mySide_${roomName}`);
        document.getElementById('mySideSelect').value = '';
        currentFlip = false; 
        updateDisplayRotation(false);
      }
      lastInitAt = data.initAt;
    }

    const isImported = !!(data.history && data.history[0] && data.history[0].type && data.history[0].type.includes("取り込み"));
    const isGameOver = !!data.winner || isImported;

    if (data.lastTick === 0 && !isGameOver) {
      isReviewMode = false;
      sessionStorage.removeItem(`isReview_${roomName}`);
      Object.keys(sessionStorage).forEach(k => { if(k.startsWith("shown_")) sessionStorage.removeItem(k); });
      rvState = null; 
    }

    state.board = JSON.parse(data.board);
    state.handS = data.handS || [];
    state.handG = data.handG || [];
    state.turn = data.turn || 'S';
    state.timers = data.timers || {S:600, G:600};
    state.config = data.config || {main:600, byo:30};

    if (typeof data.lastTick === 'number') {
      state.lastTick = data.lastTick;
    }
    state.winner = data.winner || null;    
    state.winReason = data.winReason || "";
    
    // id 補完処理

    state.history = rawHistory.map((h, idx) => {
      if (!h.id) {
        h.id = idx === 0 ? "start" : "mid_" + idx + "_" + Math.floor(Math.random() * 1000000);

    });

      showGameOverPopup(state.winner, state.winReason || "");

      if (!rvState) syncReviewStateLocally();

      document.getElementById('review-panel').style.display = 'none';

      syncReviewStateLocally();

    updateKifuList();

    get(readyRef).then(rsnap => {

  function setReviewMode(bool) {

  const cells = [];

  for (let y = 0; y < 9; y++) {
    cells[y] = [];

  function pushReviewUpdate() {
    if (!isReviewMode) return;
    set(reviewRef, { 
      viewIdx: viewIdx, 
      board: JSON.stringify(rvState.board), 
      handS: rvState.handS || [], 
      handG: rvState.handG || [], 
      turn: rvState.turn || 'S', 
      selectedBranches: selectedBranches || {},
      timestamp: getServerNow() 
    });
  }

  function finish(moveData) {
    if (state.winner && moveData.type !== "投了" && moveData.type !== "時間切れ") return;

    const nextTurn = (state.turn === 'S' ? 'G' : 'S');
    
    let foulReason = "";
    if (moveData.type !== "投了" && moveData.type !== "時間切れ") {
      if (isChecked(state.board, state.turn)) { 
        foulReason = "王手放置"; 
      } else if (moveData.isDrop && moveData.type === 'FU') {
        let count = 0;
        for (let y = 0; y < 9; y++) {
          if (state.board[y][moveData.toX]?.type === 'FU' && state.board[y][moveData.toX]?.owner === state.turn) count++;
        }
        if (count > 1) foulReason = "二歩";
      }
    }

    let isMated = false;
    if (!foulReason && state.history.length > 2 && moveData.type !== "投了" && moveData.type !== "時間切れ") {
      if (isCheckmate(state.board, nextTurn, state.handS, state.handG)) isMated = true;
    }

    const isGameOverMove = foulReason || isMated || moveData.type === "投了" || moveData.type === "時間切れ";
    if (!isGameOverMove) {
      playPieceSound();
    }

    const now = getServerNow(); 
    let newTimers = { ...state.timers };
    
    if (state.lastTick !== 0) {
      const elapsedTotal = Math.floor((now - state.lastTick) / 1000);
      const currentMain = state.timers[state.turn];
      if (currentMain < 900000) {
        newTimers[state.turn] = Math.max(0, currentMain - elapsedTotal);
      }
    }

    if (foulReason) {
      state.winner = nextTurn;
      state.winReason = foulReason;
      state.history.push({ ...moveData, board: JSON.stringify(state.board), handS: [...(state.handS || [])], handG: [...(state.handG || [])], type: moveData.type + "(反則)" });
    } else {
      if (isMated) { 
        state.winner = state.turn; 
        state.winReason = "詰み"; 
      }
      if (moveData.type === "時間切れ") {
        state.winner = (moveData.side === 'S' ? 'G' : 'S');
        state.winReason = "時間切れ";
      }
      state.history.push({ ...moveData, board: JSON.stringify(state.board), handS: [...(state.handS || [])], handG: [...(state.handG || [])] });
    }

    if (!state.winner) {
      state.turn = nextTurn;
    }

    sel = null; 
    selH = null; 
    possibleMoves = [];

    set(gameRef, { 
      board: JSON.stringify(state.board), 
      handS: state.handS || [], 
      handG: state.handG || [], 
      turn: state.turn, 
      timers: newTimers, 
      config: state.config, 
      lastTick: serverTimestamp(), 
      winner: state.winner || null, 
      winReason: state.winReason || "", 
      history: state.history,
      updatedAt: serverTimestamp() 
    }).then(() => {
      if (state.winner) {
        showGameOverPopup(state.winner, state.winReason);
      }
    });
  }

  const isChecked = (board, owner) => {
    let kx = -1, ky = -1;
    for(let y=0; y<9; y++) for(let x=0; x<9; x++) if(board[y][x]?.type==='OU' && board[y][x]?.owner===owner) { kx=x; ky=y; break; }
    if (kx === -1) return false;
    const enemy = (owner === 'S' ? 'G' : 'S');
    for(let y=0; y<9; y++) for(let x=0; x<9; x++) if(board[y][x]?.owner === enemy) if(getRawMoves(x, y, board, enemy).some(m => m.x===kx && m.y===ky)) return true;
    return false;
  };

  function showGameOverPopup(winner, reason = "") {
    if (!winner) return;
    
    // 棋譜取り込み時はポップアップを表示しない
    if (sessionStorage.getItem(`skipGameOver_${roomName}`) === "true") {
      sessionStorage.removeItem(`skipGameOver_${roomName}`);
      return;
    }

    // 感想戦・検討モード中、または勝因に対局取り込みなどの文脈がある場合はポップアップを抑制する
    if (isReviewMode || (reason && reason.includes("取り込み"))) {
      return;
    }
    
    const key = `shown_${roomName}_${state.history.length}_${winner}`;
    if (sessionStorage.getItem(key)) return;
    sessionStorage.setItem(key, "true");

    setTimeout(() => { 
      const winnerName = (winner === 'S' ? '先手▲' : '後手△');
      const msg = (reason ? `${reason}により、` : "") + `${winnerName}の勝ちです！`;
      alert(msg); 
      
      setReviewMode(true);
      syncReviewStateLocally(); 
      pushReviewUpdate();
      
      updateDisplayRotation(currentFlip);
      render();
      updateKifuList();
    }, 500); 
  }

  function generateInitialBoard(handicapType, uwateSide) {
    const board = Array(9).fill(null).map(() => Array(9).fill(null));
    const setup = (y, o, ps) => ps.forEach((p, x) => { if (p) board[y][x] = { type: p, owner: o } });
    setup(0, 'G', ['KY','KE','GI','KI','OU','KI','GI','KE','KY']);
    board[1][1] = { type: 'HI', owner: 'G' }; board[1][7] = { type: 'KA', owner: 'G' };
    setup(2, 'G', Array(9).fill('FU'));
    setup(6, 'S', Array(9).fill('FU'));
    board[7][1] = { type: 'KA', owner: 'S' }; board[7][7] = { type: 'HI', owner: 'S' };
    setup(8, 'S', ['KY','KE','GI','KI','OU','KI','GI','KE','KY']);

    const isUwateG = (uwateSide === 'G');
    const uY0 = isUwateG ? 0 : 8; const uY1 = isUwateG ? 1 : 7;
    const del = (y, x) => { board[y][x] = null; };
    
    if(handicapType === "香落ち") del(uY0, isUwateG ? 0 : 8);
    else if(handicapType === "角落ち") del(uY1, isUwateG ? 7 : 1);
    else if(handicapType === "飛車落ち") del(uY1, isUwateG ? 1 : 7);
    else if(handicapType === "飛香落ち") { del(uY1, isUwateG ? 1 : 7); del(uY0, isUwateG ? 0 : 8); }
    else if(handicapType === "二枚落ち") { del(uY1, 1); del(uY1, 7); }
    else if(handicapType === "四枚落ち") { del(uY1, 1); del(uY1, 7); del(uY0, 0); del(uY0, 8); }
    else if(handicapType === "六枚落ち") { del(uY1, 1); del(uY1, 7); del(uY0, 0); del(uY0, 8); del(uY0, 1); del(uY0, 7); }
    else if(handicapType === "八枚落ち") { del(uY1, 1); del(uY1, 7); del(uY0, 0); del(uY0, 8); del(uY0, 1); del(uY0, 7); del(uY0, 2); del(uY0, 6); }
    return board;
  }

  function syncReviewStateLocally() { 
    const currentLine = buildActiveLine();
    if (viewIdx < 0 || viewIdx >= currentLine.length) viewIdx = currentLine.length - 1; 
    const hist = currentLine[viewIdx]; 
    if (!hist) return;
    let t = 'S';
    if (viewIdx > 0 && hist.side) {
      t = (hist.side === 'S') ? 'G' : 'S';
    } else if (viewIdx === 0) {
      t = 'S';
    } else {
      t = (viewIdx % 2 === 0) ? 'S' : 'G';
    }
    rvState = { 
      board: JSON.parse(hist.board), 
      handS: [...(hist.handS || [])], 
      handG: [...(hist.handG || [])],
      turn: t
    }; 
    sel = null; selH = null; possibleMoves = []; 
    if (typeof resetAiAnalysisUI === 'function' && !aiAnalysisActive) {
      resetAiAnalysisUI();
    }
  }

  let aiAnalysisActive = false;
  let activeWorker = null;
  let activeTimeout = null;
  let lastAnalyzedSfen = "";

  function resetAiAnalysisUI() {
    aiAnalysisActive = false;
    lastAnalyzedSfen = "";
    if (activeWorker) {
      try { activeWorker.terminate(); } catch (e) {}
      activeWorker = null;
    }
    if (activeTimeout) {
      clearTimeout(activeTimeout);
      activeTimeout = null;
    }

    const statusLabel = document.getElementById('ai-status-label');
    const evalArea = document.getElementById('ai-evaluation-area');
    const recommendedArea = document.getElementById('ai-recommended-area');
    const explanationBox = document.getElementById('ai-explanation-box');
    const btn = document.getElementById('btnAiAnalyze');

    if (statusLabel) {
      statusLabel.textContent = "解析準備完了";
      statusLabel.style.color = "#e65100";
    }
    if (evalArea) evalArea.style.display = 'none';
    if (recommendedArea) recommendedArea.style.display = 'none';
    if (explanationBox) {

    }
    if (btn) {
      btn.disabled = false;
      btn.style.background = "#ff9800";
      btn.textContent = "この局面をAI解析する";
    }
  }

  function handleCellClick(x, y) {
    if (isReviewMode) {
      const target = rvState.board[y][x];
      
      if (sel && sel.x === x && sel.y === y) {
        sel = null;
        possibleMoves = [];
        render();
        return;
      }

      if (sel && possibleMoves.some(m => m.x === x && m.y === y)) {
        const fromP = rvState.board[sel.y][sel.x];
        if (!fromP) return;

        // 手番制限チェック：現在の感想戦手番の駒のみ動かせる
        if (fromP.owner !== rvState.turn) {
          sel = null;
          possibleMoves = [];
          render();
          return;
        }

        const moveData = {
          side: fromP.owner, fromX: sel.x, fromY: sel.y,
          toX: x, toY: y, type: fromP.type, isDrop: false, isPromoted: false
        };
        const promLine = (fromP.owner === 'S') ? [0, 1, 2] : [6, 7, 8];

        let nextHandS = [...rvState.handS];
        let nextHandG = [...rvState.handG];
        if (target && target.owner !== fromP.owner) {
          (fromP.owner === 'S' ? nextHandS : nextHandG).push(UNPROMOTE_MAP[target.type] || target.type);
        }

        if (PROMOTE_MAP[fromP.type] && (promLine.includes(y) || promLine.includes(sel.y))) {
          const deadLine = (fromP.owner === 'S') ? 0 : 8;
          const isKeiForce = (fromP.type === 'KE' && (fromP.owner === 'S' ? y <= 1 : y >= 7));
          const isFuKyForce = ((fromP.type === 'FU' || fromP.type === 'KY') && y === deadLine);

          if (isKeiForce || isFuKyForce) {
            playPieceSound();
            const nextBoard = JSON.parse(JSON.stringify(rvState.board));
            nextBoard[sel.y][sel.x] = null;
            nextBoard[y][x] = { type: PROMOTE_MAP[fromP.type], owner: fromP.owner };
            
            const nextMoveData = {
              ...moveData,
              type: PROMOTE_MAP[fromP.type],
              isPromoted: true
            };
            
            sel = null;
            possibleMoves = [];
            addReviewMove(nextMoveData, nextBoard, nextHandS, nextHandG);
          } else {
            pendingProm = { x, y, moveData, nextHandS, nextHandG };
            document.getElementById('promote-dialog').style.display = 'block';
          }
        } else {
          playPieceSound();
          const nextBoard = JSON.parse(JSON.stringify(rvState.board));
          nextBoard[sel.y][sel.x] = null;
          nextBoard[y][x] = { type: fromP.type, owner: fromP.owner };
          
          sel = null;
          possibleMoves = [];
          addReviewMove(moveData, nextBoard, nextHandS, nextHandG);
        }
        render();
        return;
      }

      if (selH) {
        if (!target && possibleMoves.some(m => m.x === x && m.y === y)) {
          // 手番制限チェック：現在の手番の持ち駒のみ打てる
          if (selH.owner !== rvState.turn) {
            selH = null;
            possibleMoves = [];
            render();
            return;
          }

          const targetHand = (selH.owner === 'S' ? [...rvState.handS] : [...rvState.handG]);
          if (targetHand && targetHand[selH.idx] === selH.type) {
            playPieceSound();
            targetHand.splice(selH.idx, 1);
            
            const nextBoard = JSON.parse(JSON.stringify(rvState.board));
            nextBoard[y][x] = { type: selH.type, owner: selH.owner };
            
            const moveData = {
              side: selH.owner, fromX: -1, fromY: -1,
              toX: x, toY: y, type: selH.type, isDrop: true, isPromoted: false
            };

            const nextHandS = (selH.owner === 'S' ? targetHand : rvState.handS);
            const nextHandG = (selH.owner === 'G' ? targetHand : rvState.handG);

            selH = null;
            possibleMoves = [];
            addReviewMove(moveData, nextBoard, nextHandS, nextHandG);
          }
        } else {
          selH = null;
          possibleMoves = [];
        }
        render();
        return;
      }

      if (target) {
        // 現在の手番以外の駒へのタップは無視/選択解除
        if (target.owner !== rvState.turn) {
          sel = null;
          possibleMoves = [];
          render();
          return;
        }

        sel = { x, y };
        possibleMoves = getLegalMoves(x, y, rvState.board, target.owner);
      } else {
        sel = null;
        possibleMoves = [];
      }
      render();
      return;
    }

    if (state.lastTick === 0 || state.winner || state.turn !== mySide || pendingProm) return;

    const target = state.board[y][x];

    if (sel && sel.x === x && sel.y === y) {
      sel = null;
      possibleMoves = [];
      render();
      return;
    }

    if (sel && possibleMoves.some(m => m.x === x && m.y === y)) {
      const fromP = state.board[sel.y][sel.x];
      if (!fromP) return;

      const moveData = {
        side: mySide, fromX: sel.x, fromY: sel.y,
        toX: x, toY: y, type: fromP.type, isDrop: false, isPromoted: false
      };
      const promLine = (mySide === 'S') ? [0, 1, 2] : [6, 7, 8];

      if (target && target.owner !== mySide) {
        const h = (mySide === 'S' ? state.handS : state.handG) || [];
        h.push(UNPROMOTE_MAP[target.type] || target.type);
        if (mySide === 'S') state.handS = h; else state.handG = h;
      }

      if (PROMOTE_MAP[fromP.type] && (promLine.includes(y) || promLine.includes(sel.y))) {
        const deadLine = (mySide === 'S') ? 0 : 8;
        if (((fromP.type === 'FU' || fromP.type === 'KY') && y === deadLine) || (fromP.type === 'KE' && (mySide === 'S' ? y <= 1 : y >= 7))) {
          state.board[sel.y][sel.x] = null;
          state.board[y][x] = { type: PROMOTE_MAP[fromP.type], owner: mySide };
          moveData.type = PROMOTE_MAP[fromP.type];
          moveData.isPromoted = true;
          finish(moveData);
        } else {
          pendingProm = { x, y, moveData };
          document.getElementById('promote-dialog').style.display = 'block';
          render();
        }
      } else {
        state.board[sel.y][sel.x] = null;
        state.board[y][x] = { type: fromP.type, owner: mySide };
        finish(moveData);
      }
      return;
    }

    if (selH) {
      if (!target && possibleMoves.some(m => m.x === x && m.y === y)) {
        const targetHand = (mySide === 'S' ? state.handS : state.handG);
        if (targetHand && targetHand[selH.idx] === selH.type) {
          state.board[y][x] = { type: selH.type, owner: mySide };
          targetHand.splice(selH.idx, 1);
          possibleMoves = [];
          finish({ side: mySide, toX: x, toY: y, type: selH.type, isDrop: true });
          return;
        }
      }
      selH = null;
      possibleMoves = [];
      render();
      return;
    }

    if (target && target.owner === mySide) {
      sel = { x, y };
      possibleMoves = getLegalMoves(x, y, state.board, mySide);
    } else {
      sel = null;
      possibleMoves = [];
    }
    render();
  }

  function render() {
    if (isReviewMode && !rvState) {
      if (state.history && state.history.length > 0) {
        syncReviewStateLocally();
      } else {
        return;
      }
    }

    let b, hs, hg;
    if (isReviewMode) {
      b = rvState.board;
      hs = rvState.handS;
      hg = rvState.handG;
    } else {
      b = state.board;
      hs = state.handS;
      hg = state.handG;
    }

    const PIECE_POS = {
      'OU': {x:0, y:0}, 'HI': {x:1, y:0}, 'KA': {x:2, y:0}, 'KI': {x:3, y:0}, 'GI': {x:4, y:0}, 'KE': {x:5, y:0}, 'KY': {x:6, y:0}, 'FU': {x:7, y:0},
      'RY': {x:1, y:1}, 'UM': {x:2, y:1}, 'NG': {x:4, y:1}, 'NK': {x:5, y:1}, 'NY': {x:6, y:1}, 'TO': {x:7, y:1}
    };

    for (let y = 0; y < 9; y++) {
      for (let x = 0; x < 9; x++) {
        const c = cells[y][x];
        const p = b[y][x];
        const isPossible = possibleMoves.some(m => m.x === x && m.y === y);
        
        c.className = 'cell';
        if (sel?.x === x && sel?.y === y) c.classList.add('selected');
        if (isPossible) c.classList.add('possible');

        if (p) {
          const isOpposite = (p.owner === 'G');
          const pos = PIECE_POS[p.type];
          const bgX = (pos.x / 7) * 100;
          const bgY = (pos.y / 3) * 100; 
          
          c.innerHTML = `<div class="piece ${isOpposite?'opposite':''}">
            <div class="piece-img" style="background-position: ${bgX.toFixed(10)}% ${bgY.toFixed(10)}%;"></div>
          </div>`;
        } else {
          c.innerHTML = '';
        }
      }
    }

    // 持ち駒描画：1マス幅（1/9）に精密に合わせる
    const drawH = (id, list, owner) => {
      const el = document.getElementById(id);
      if (!el) return;
      el.innerHTML = '';
      const HAND_ORDER = ['HI', 'KA', 'KI', 'GI', 'KE', 'KY', 'FU'];
      
      const counts = {};
      (list || []).forEach(type => { counts[type] = (counts[type] || 0) + 1; });
      const existingTypes = HAND_ORDER.filter(type => counts[type] > 0);

      for (let i = 0; i < 9; i++) {
        const type = existingTypes[i];

        const slot = document.createElement('div');
        slot.className = 'hand-slot';
        
        if (type) {
          const s = document.createElement('div');
          s.style.width = "100%";
          s.style.height = "100%";
          s.style.display = "flex";
          s.style.alignItems = "center";
          s.style.justifyContent = "center";
          s.style.cursor = "pointer";
          s.style.position = "relative";
          
          const pos = PIECE_POS[type];
          const bgX = (pos.x / 7) * 100;
          const bgY = (pos.y / 3) * 100;

          // 手駒は親（手駒エリア）の回転だけで完全に正しい向きになるため、piece要素の個別oppositeクラスは不要です
          s.innerHTML = `<div class="piece">
            <div class="piece-img" style="background-position: ${bgX.toFixed(10)}% ${bgY.toFixed(10)}%;"></div>
          </div>`;

          if (counts[type] > 1) {
            const c = document.createElement('div');
            c.className = 'hand-count';
            c.textContent = counts[type];
            s.appendChild(c);
          }

          if (selH && selH.type === type && selH.owner === owner) {
            s.classList.add('selected-piece');
          }

          const firstIdx = list.indexOf(type);
          s.onclick = (e) => {
            e.stopPropagation();
            if (!isReviewMode) {
              if (state.lastTick === 0 || state.winner || state.turn !== mySide || owner !== mySide) return;
            } else {
              if (owner !== rvState.turn) return;
            }
            if (selH && selH.type === type && selH.owner === owner) {
              selH = null;
              possibleMoves = [];
            } else {
              selH = { type: type, owner, idx: firstIdx };
              sel = null;
              const currentBoard = isReviewMode ? rvState.board : state.board;
              const currentHandS = isReviewMode ? rvState.handS : state.handS;
              const currentHandG = isReviewMode ? rvState.handG : state.handG;
              possibleMoves = getLegalDrops(type, owner, currentBoard, currentHandS, currentHandG);
            }
            render();
          };

          slot.appendChild(s);
        }

        el.appendChild(slot);
      }
    };

    drawH('handS', hs, 'S');
    drawH('handG', hg, 'G');

    const st = document.getElementById('status-txt');
    if (state.winner && !isReviewMode) {
      st.textContent = `${state.winner === 'S' ? '先手' : '後手'}勝`;
      st.style.color = "red";
    } else if (isReviewMode) {
      const turnJp = (rvState && rvState.turn === 'S') ? '先手番' : '後手番';
      st.textContent = `感想戦 (${turnJp})`;
      st.style.color = "darkorange";
    } else {
      st.textContent = state.turn === mySide ? "手番" : "待機";
      st.style.color = "black";
    }

    // 感想戦モードかどうかで、投了（btnResign）ボタンを非表示にする
    const resignBtn = document.getElementById('btnResign');
    const importKifBtn = document.getElementById('btnImportKif');
    const isDuringGame = (state.lastTick !== 0 && !state.winner);

    if (resignBtn) {
      if (isReviewMode) {
        resignBtn.style.display = 'none';
      } else {
        if (state.lastTick === 0 || state.winner) {
          resignBtn.style.display = 'none';
        } else {
          resignBtn.style.display = 'inline-block';
        }
      }
    }

    if (importKifBtn) {
      const isImported = !!(state.history && state.history[0] && state.history[0].type && state.history[0].type.includes("取り込み"));
      const isActuallyDuringGame = (state.lastTick !== 0 && !state.winner && !isImported);

      if (isActuallyDuringGame && !isReviewMode) {
        importKifBtn.style.display = 'none';
      } else {
        importKifBtn.style.display = 'inline-block';
      }
    }

    // 準備画面中の分かりやすい手順解説テキストを動的に提供
    const guideEl = document.getElementById('prep-guide-txt');
    if (guideEl) {
      if (isDuringGame || isReviewMode || state.winner) {
        guideEl.style.display = 'none';
      } else {
        guideEl.style.display = 'block';
        if (!mySide) {
          guideEl.innerHTML = `<strong>【手順1：手番選択】</strong><br>プルダウンメニューから「先手▲」または「後手△」を選択してください。`;
          guideEl.style.background = '#fffde7';
          guideEl.style.borderColor = '#fff59d';
        } else if (!currentReadyData[mySide]) {
          const sideText = mySide === 'S' ? '先手▲' : '後手△';
          guideEl.innerHTML = `<strong>【手順2：準備完了の報告】</strong><br>${sideText}を選択中。「対局準備完了」ボタンをクリックして準備状態にしてください。`;
          guideEl.style.background = '#e3f2fd';
          guideEl.style.borderColor = '#90caf9';
        } else {
          const opponentSide = mySide === 'S' ? 'G' : 'S';
          const opponentText = opponentSide === 'S' ? '先手▲' : '後手△';
          const isOpponentReady = currentReadyData[opponentSide];
          if (isOpponentReady) {
            guideEl.innerHTML = `<strong>【手順3：対局開始】</strong><br>両者の準備が整いました。カウントダウン後に自動で対局が始まります！`;
            guideEl.style.background = '#e8f5e9';
            guideEl.style.borderColor = '#a5d6a7';
          } else {
            guideEl.innerHTML = `<strong>【手順3：相手の準備待ち】</strong><br>あなたの準備は完了しています。対戦相手（${opponentText}）の準備完了を待っています。`;
            guideEl.style.background = '#fff3e0';
            guideEl.style.borderColor = '#ffb74d';
          }
        }
      }
    }

    document.getElementById('nav-pos').textContent = `${viewIdx}/${buildActiveLine().length-1}`;
    const activeTurn = isReviewMode ? (rvState?.turn || 'S') : state.turn;
    document.getElementById('timer-S').className = `timer ${activeTurn==='S'?'your-turn':''}`;
    document.getElementById('timer-G').className = `timer ${activeTurn==='G'?'your-turn':''}`;

    const aiPanel = document.getElementById('ai-analysis-panel');
    if (aiPanel) {
      aiPanel.style.display = isReviewMode ? 'block' : 'none';
    }

    if (isReviewMode) {
      updateAiAnalysisView();
    }
  }

  function formatKifuTextForBranch(move, idx) {
    if (!move) return `不明`;
    const side = move.side === 'S' ? "▲" : "△";
    if (move.type.includes("投了")) return `${side}投了`;
    if (move.type.includes("時間切れ")) return `${side}切れ負`;
    const x = 9 - move.toX, y = KANJI_NUM[move.toY + 1];
    let typeName = move.type.replace("(反則)","").replace("投了","").replace("時間切れ","");
    let type = SYMBOLS[typeName] || "？";
    if (move.isPromoted) type += "成"; 
    else if (move.isDrop) type += "打";
    return `${side}${x}${y}${type}`;
  }

  function updateKifuList() {
    const container = document.getElementById('kifu-container'); 
    container.innerHTML = '';
    const currentLine = buildActiveLine();
    
    currentLine.forEach((h, i) => {
      const rowDiv = document.createElement('div');
      rowDiv.style.display = 'flex';
      rowDiv.style.flexDirection = 'column';
      rowDiv.style.width = '100%';
      rowDiv.style.borderBottom = '1px solid #eee';

      const div = document.createElement('div'); 
      div.className = `kifu-item ${isReviewMode && viewIdx === i ? 'active' : ''}`;
      div.style.display = 'flex';
      div.style.justifyContent = 'space-between';
      div.style.alignItems = 'center';
      div.style.padding = '5px 8px';
      div.style.flex = '1';
      div.style.borderBottom = 'none';

      const textSpan = document.createElement('span');
      textSpan.textContent = formatKifuText(h, i, currentLine);
      textSpan.style.cursor = 'pointer';
      textSpan.onclick = () => { 
        window.jumpToKifuMove(i);
      };
      div.appendChild(textSpan);

      if (isReviewMode && h.branches && h.branches.length > 0) {
        const branchBtn = document.createElement('button');
        branchBtn.textContent = '＋';
        branchBtn.style.padding = '0px 4px';
        branchBtn.style.fontSize = '8px';
        branchBtn.style.marginLeft = '4px';
        branchBtn.style.background = '#4caf50';
        branchBtn.style.color = 'white';
        branchBtn.style.border = 'none';
        branchBtn.style.borderRadius = '2px';
        branchBtn.style.cursor = 'pointer';
        branchBtn.style.lineHeight = '1.2';
        
        branchBtn.onclick = (e) => {
          e.stopPropagation();
          const existingMenu = rowDiv.querySelector('.branch-menu');
          if (existingMenu) {
            existingMenu.remove();
          } else {
            const menu = document.createElement('div');
            menu.className = 'branch-menu';
            menu.style.background = '#eef5ee';
            menu.style.padding = '4px 8px';
            menu.style.fontSize = '8px';
            menu.style.display = 'flex';
            menu.style.flexDirection = 'column';
            menu.style.gap = '3px';
            menu.style.borderTop = '1px dashed #4caf50';

            const honDiv = document.createElement('div');
            honDiv.style.cursor = 'pointer';
            honDiv.style.padding = '2px';
            honDiv.style.borderRadius = '2px';
            const isUsingMain = (selectedBranches[h.id] === undefined);
            honDiv.textContent = `● 本線 (※次の手)`;
            if (isUsingMain) {
              honDiv.style.fontWeight = 'bold';
              honDiv.style.background = '#c8e6c9';
            }
            honDiv.onclick = () => {
              delete selectedBranches[h.id]; 
              pushReviewUpdate();
              syncReviewStateLocally();
              render();
              updateKifuList();
            };
            menu.appendChild(honDiv);

            h.branches.forEach((b, bIdx) => {
              const itemRow = document.createElement('div');
              itemRow.style.display = 'flex';
              itemRow.style.justifyContent = 'space-between';
              itemRow.style.alignItems = 'center';
              itemRow.style.padding = '2px';
              itemRow.style.borderRadius = '2px';

              const itemDiv = document.createElement('div');
              itemDiv.style.cursor = 'pointer';
              itemDiv.style.flex = '1';
              
              const firstMoveText = formatKifuTextForBranch(b[0], i + 1);
              const isSelected = (selectedBranches[h.id] === bIdx);
              itemDiv.textContent = `${isSelected ? '★' : '○'} 変化${bIdx + 1}: ${firstMoveText}`;
              if (isSelected) {
                itemRow.style.fontWeight = 'bold';
                itemRow.style.background = '#a5d6a7';
              }
              
              itemDiv.onclick = () => {
                selectedBranches[h.id] = bIdx;
                pushReviewUpdate();
                syncReviewStateLocally();
                render();
                updateKifuList();
              };
              itemRow.appendChild(itemDiv);

              const delBtn = document.createElement('span');
              delBtn.textContent = ' ✕ ';
              delBtn.style.color = 'red';
              delBtn.style.cursor = 'pointer';
              delBtn.style.fontWeight = 'bold';
              delBtn.style.padding = '0 5px';
              delBtn.style.fontSize = '10px';
              delBtn.onclick = (e) => {
                e.stopPropagation();
                if (confirm(`この変化手順（変化${bIdx + 1}）を削除してよろしいですか？`)) {
                  h.branches.splice(bIdx, 1);
                  if (h.branches.length === 0) {
                    delete h.branches;
                  }
                  if (selectedBranches[h.id] === bIdx) {
                    delete selectedBranches[h.id];
                  } else if (selectedBranches[h.id] > bIdx) {
                    selectedBranches[h.id]--;
                  }
                  set(ref(db, `${roomName}/shogiData/history`), state.history);
                  pushReviewUpdate();
                  syncReviewStateLocally();
                  render();
                  updateKifuList();
                }
              };
              itemRow.appendChild(delBtn);

              menu.appendChild(itemRow);
            });

            rowDiv.appendChild(menu);
          }
        };
        div.appendChild(branchBtn);
      }

      rowDiv.appendChild(div);
      container.appendChild(rowDiv); 
      if (isReviewMode && viewIdx === i) div.scrollIntoView({ block: 'nearest' });
    });
  }

  function formatKifuText(move, idx, currentLine) {
    if (idx === 0) return "開始";
    if (!move) return `${idx}.不明`;
    const side = move.side === 'S' ? "▲" : "△";

    if (move.type.includes("投了")) return `${idx}.${side}投了`;
    if (move.type.includes("時間切れ")) return `${idx}.${side}切れ負`;
    if (move.type.includes("反則")) return `${idx}.${side}反則`;
    if (typeof move.toX !== 'number' || typeof move.toY !== 'number') return `${idx}.${side}中断`;

    const x = 9 - move.toX, y = KANJI_NUM[move.toY + 1];
    const targetLine = currentLine || buildActiveLine();
    const isSame = (idx > 1 && targetLine[idx-1] && move.toX === targetLine[idx-1].toX && move.toY === targetLine[idx-1].toY);
    
    let typeName = move.type.replace("(反則)","").replace("投了","").replace("時間切れ","");
    let type = SYMBOLS[typeName] || "？";
    if (move.isPromoted) type += "成"; 
    else if (move.isDrop) type += "打";
    
    return `${idx}.${side}${isSame ? "同" : x+y}${type}`;
  }

  function updateTimerDisplay() {
    const now = getServerNow(); 
    const diff = now - state.lastTick;
    const elapsed = (state.lastTick === 0 || isReviewMode || state.winner) ? 0 : Math.floor(Math.max(0, diff - 200) / 1000);

    const isImported = !!(state.history && state.history[0] && state.history[0].type && state.history[0].type.includes("取り込み"));

    ['S', 'G'].forEach(s => {
      let remMain = state.timers[s]; 
      let displayStr = ""; 
      let isByoAlert = false; 
      const el = document.getElementById(`timer-${s}`);
      if (!el) return;
      const mark = (s === 'S' ? '▲' : '△');

      if (isImported) {
        displayStr = `${mark} --:--`;
      } else {
        const isMainInf = (remMain >= 900000);
        const isByoInf = (state.config.byo >= 900000);

        if (state.turn === s && !state.winner && !isReviewMode && state.lastTick !== 0) {
          if (isMainInf) {
            displayStr = `${mark} 無制限`;
          } else if (remMain > elapsed) {
            const currentRem = remMain - elapsed;
            displayStr = `${mark} ${Math.floor(currentRem/60)}:${(currentRem%60).toString().padStart(2,'0')}`;
          } else {
            if (isByoInf) {
              displayStr = `${mark} 秒:無制限`;
            } else {
              const overTime = Math.max(0, elapsed - remMain);
              const byoRem = Math.max(0, (state.config.byo || 30) - overTime);
              displayStr = `${mark} 秒:${byoRem}`;
              if (byoRem <= 5) isByoAlert = true;
              
              if (byoRem <= 0 && !state.winner && !pendingProm) {
                  if (mySide === 'S' || mySide === 'G') {
                      finish({ 
                        side: s, 
                        type: "時間切れ", 
                        toX: null, 
                        toY: null,
                        isDrop: false 
                      }); 
                  }
              }
            }
          }
        } else {
          if (isMainInf) {
            displayStr = `${mark} 無制限`;
          } else if (remMain > 0) {
            displayStr = `${mark} ${Math.floor(remMain/60)}:${(remMain%60).toString().padStart(2,'0')}`;
          } else {
            displayStr = `${mark} 秒:${isByoInf ? '無制限' : (state.config.byo || 30)}`;
          }
        }
      }
      
      el.textContent = displayStr; 
      if (isByoAlert) el.classList.add('timer-alert'); 
      else el.classList.remove('timer-alert');
    });
  }

  setInterval(updateTimerDisplay, 1000);


  document.getElementById('nav-prev').onclick = () => { if (viewIdx > 0) { viewIdx--; syncReviewStateLocally(); pushReviewUpdate(); render(); updateKifuList(); } };
  document.getElementById('nav-next').onclick = () => { const curLine = buildActiveLine(); if (viewIdx < curLine.length - 1) { viewIdx++; syncReviewStateLocally(); pushReviewUpdate(); render(); updateKifuList(); } };
  document.getElementById('nav-first').onclick = () => { if (isReviewMode) { viewIdx = 0; syncReviewStateLocally(); pushReviewUpdate(); render(); updateKifuList(); } };
  document.getElementById('nav-last').onclick = () => { if (isReviewMode) { const curLine = buildActiveLine(); viewIdx = curLine.length - 1; syncReviewStateLocally(); pushReviewUpdate(); render(); updateKifuList(); } };
